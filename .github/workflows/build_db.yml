name: Validate SQLite Schema

# Triggers whenever schema or build script changes on main
on:
  push:
    branches:
      - main
    paths:
      - schema_sqlite.sql
      - indexes_sqlite.sql
      - build_db.py

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build and validate schema
        run: |
          python build_db.py
          echo "Schema valid — contoso.db built successfully (not committed)."
