name: Validate Pipeline

# Triggers when core pipeline files change on main
on:
  push:
    branches:
      - main
    paths:
      - load_data.py
      - analysis/build_marts.sql
      - scripts/export_for_powerbi.py
      - setup.sh

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install duckdb pandas kaggle -q

      - name: Load data from Kaggle
        if: ${{ secrets.KAGGLE_API_TOKEN != '' }}
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python load_data.py

      - name: Build AllSales mart
        if: ${{ secrets.KAGGLE_API_TOKEN != '' }}
        run: |
          python -c "
          import duckdb
          conn = duckdb.connect('contoso.duckdb')
          conn.execute(open('analysis/build_marts.sql').read())
          print('AllSales built OK')
          conn.close()
          "

      - name: Export to Parquet
        if: ${{ secrets.KAGGLE_API_TOKEN != '' }}
        run: python scripts/export_for_powerbi.py

      - name: Verify AllSales row count
        if: ${{ secrets.KAGGLE_API_TOKEN != '' }}
        run: |
          python -c "
          import duckdb
          conn = duckdb.connect('contoso.duckdb', read_only=True)
          n = conn.execute('SELECT COUNT(*) FROM AllSales').fetchone()[0]
          conn.close()
          print(f'AllSales rows: {n:,}')
          assert n > 10_000_000, f'Expected >10M rows, got {n}'
          print('Row count check passed.')
          "

      - name: Syntax check (no Kaggle credentials)
        if: ${{ secrets.KAGGLE_API_TOKEN == '' }}
        run: |
          python -c "import duckdb, load_data, scripts.export_for_powerbi; print('Imports OK')" || true
          python -m py_compile load_data.py scripts/export_for_powerbi.py profiling/profile_data.py
          echo "Syntax checks passed."
